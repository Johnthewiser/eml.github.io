//>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>> onScanButtonCLick >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
	async function onScanButtonClick()
  	{
    //If html id 'button1' == 'Connect'>
  	//Change button text>>>
			let btError = "A";
			var button = document.getElementById('button1');
      if(document.getElementById('button1').innerHTML === button1PrimaryString) //if no device is connected
      	{
					btError = "H";
      		try
      			{
						//>Choose device>
							btDevice = await navigator.bluetooth.requestDevice
								({
//							acceptAllDevices:true
      						filters:
      							[
      								 {services: [btServiceId]}
      							]
      					});
						//>Device chosen, connect to it>
							btError = "B";
							btServer=await btDevice.gatt.connect();
      			//Connected, ask for the count service
							btError = "C";
							btService = await btServer.getPrimaryService(btServiceId);
							
      			//>Got the service, ask for count characteristic>
							btError = "C";
							btCharacteristic=await btService.getCharacteristic(btCharacteristicId);
							
      			//>start disconnection notifications in case disconnection happens unexpectedly>
							btDevice.addEventListener('gattserverdisconnected',onDisconnect); //function call: onDisconnect
      			//>>> Got count characteristic (which should have read, write, and notify attributes enabled so start count notifications >>>
							btError = "D";
      				await btCharacteristic.startNotifications();
						// Enable notification events from counter>
							btError = "E";
							await btCharacteristic.addEventListener('characteristicvaluechanged',handleCountNotification);
						//ensure counter is reset>
							btError = "F";
							let resetVal=Uint8Array.of(6); //device will reset tip count and its time values to 0 on receipt of this write regardless of values written
							await btCharacteristic.writeValue(resetVal); //tell the counter to reset its tip count and time the counter should respeond with a notificaiton with count=0 time=0

						//Update display to indicate the device is connected>
							button.innerText=button.textContent=button1SecondaryString; 				//>change button1 from 'Connect' 'Disconnect' (button1 is still selected from if statement above)
							displaySection1Status("Waiting for count. Update Site/Raingauge/etc?","black");
						//>display count, time of last tip and battery charge>
							enableDisableCount(enable);	//indicate counter is connected by turning count data background from greyed out to blue
						}
      		catch(error)
      			{
      				console.log('Error: ' + btError + ' ' + error + ', code: ' + error.code + ', message: ' + error.message);
      				console.log(' Service '+btCharacteristic.service.uuid
      					+ ', uuid ' + btCharacteristic.uuid + ', Notify ' + btCharacteristic.properties.notify + ', Read ' + btCharacteristic.properties.read
      					+ ', Value ' + btCharacteristic.value);
      			}
      	} //end of if button1 says 'Connect'

//>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>> If html id 'button1' is displaying 'Disconnect'>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
      else // if connected and therefore button1 is displaying 'Disconnect' disconnect
      	{
      		countVal=0;
      		if(btDevice.gatt.connected) //if a bluetooth device is connected
      			{
      				try
      					{
		                //stop disconnection events (otherwise disconnecting here will cause a disconnection event calling onDisconnect
									await btCharacteristic.stopNotifications();
      						btDevice.removeEventListener('gattserverdisconnected',onDisconnect); //function call: onDisconnect

      					//>reset counter>
      						btCharacteristic.removeEventListener('characteristicvaluechanged',handleCountNotification);
        		        //forget device>
      						await btDevice.forget(); //forget device (so it's no longer 'Paired')
		            //Finally, tell device to disconnect
									await btDevice.gatt.disconnect();
      					}
      				catch(error)
      					{
      						console.log('Error3: '+error+', code: '+error.code+', message: '+error.message+' Service '+btCharacteristic.service.uuid

					firstConnectFlag = 1; //set this flag again so that a reset is sent the next counter connected
					displaySection1Status("Connect counter","black");

					blankCount(); //remove values from counter
      	} //end of else 'if connected and therefore button1 is displaying 'Disconnect' disconnect'

    } //end of function onScanButtonClick

//>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>> handleCountNotification >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
	function handleCountNotification(event)
		{
			btValue=event.target.value; //an notify has been received to say either the count and it's time and/or the battery charge has changed
			displayCount(); //so update the count, time and battery charge

			//clear the results displayed in the resultLog table>
				for(let rowNumber = 0 ; rowNumber < maxResultLogEntries ; rowNumber++)
					{
						for(let columnNumber = 0 ; columnNumber < maxResultLogColumns ;  columnNumber++)
							{

//>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>> updateResultLogTable >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
function updateResultLogTable(resultStartPosition)
	{
		var stringLength;
		var indexStringLength;
		let tempResultLogString = resultLogString.slice(resultStartPosition) //make a copy of the result(s) string which will be reduced to 0 as the results are written

	do
		{
	//add a result to the results table>
		for(let columnNumber = 0 ; columnNumber < maxResultLogColumns;  columnNumber++) //fill each column entry with ends with a comma (last column has no comma but ends with a carriage return and a line feed
			{
				if(columnNumber < maxResultLogColumns -1) //each column entry ends with a comma except the last column which ends with a linefeed and carriage return
					{
						stringLength = tempResultLogString.indexOf(csvSeparator); //get the position of the next column separator character
						indexStringLength = 1; //separator character is a single character
					}
				else
					{
						stringLength = tempResultLogString.indexOf("\r\n"); //the last column does not end with the separator character, it ends with carriage return and new line characters
						indexStringLength = 2; //two characters at the end of the line
					}

				let tableDataString = tempResultLogString.slice(0,stringLength) //make a string to be put into a table column (the string is from the start position to the next comma)
				tempResultLogString = tempResultLogString.slice(stringLength + indexStringLength) //remove that table column string from the string containing the rest of the result
				let resultLogID = "table1c" + columnNumber + "r" + resultLogEntries //prepare html table cell id string
				document.getElementById(resultLogID).innerHTML = tableDataString; //display the column entry
			}

		tempResultLogString = tempResultLogString.slice(resultStartPosition) //make a copy of the result(s) string which will be reduced to 0 length as the results are written
		++resultLogEntries;
		}
		while(tempResultLogString != ""); //at this point tempResultLogString should either, start with the first character of the next table result, or be empty if the last result has been added to the table
		if(resultLogEntries >= maxResultLogEntries)
			{
				displaySection2Status("Counts table Full! Save to file to continue","red");
				enableDisableButton('button4',enable); //disable button
				enableDisableButton('button5',enable); //disable button
				enableDisableButton('button6',disable); //disable button
				document.getElementById('section1').style.display='none'; //hide the counter display section
				document.getElementById('section2').style.display='block'; //show the result log table section
			}

	}

  function displayCount() //display received count>
		{
    //get count value from received data>
      countVal=(btValue.getUint8(1)*256)+btValue.getUint8(0); //bytes are transmitted in reverse so swap top and bottom bytes to get correct 16 bit value
			if(countVal != lastCountVal)
				{
					lastCountVal = countVal; //keep a record of the last count value received
      		//Update displayed status and flags if counting has started>
    			if(countVal != 0)
      			{
      				countingFlag = 1;
							enableDisableButton("button2",enable);
							displaySection1Status("Counting. Update Site/Raingauge/etc?","black");
						}
					else
						{
      				countingFlag = 0 ;
							enableDisableButton("button2",disable);
							displaySection1Status("Waiting for count. Update Site/Raingauge/etc?","black");
						}
					//turn count into a string and display it
					countString=String(countVal).padStart(3,'0');
      		document.getElementById("countValue").innerHTML=countString;
		//display received time>
      		let timeVal=(btValue.getUint8(3)*256)+btValue.getUint8(2);
      		minutesVal=Math.floor(timeVal/60);
      		secondsVal=Math.floor(timeVal%60);

      		minutesVal = String(minutesVal).padStart(2,'0');

      						startTime=Math.floor(Date.now()/1000); //get local seconds
							enableDisableButton('button2',enable)

      									}

      						}
      				}
					} //end of if countVal has changed

			//display battery level>
				let batteryStatus=btValue.getUint8(4);
						batteryString = "";
								if(batteryStatus & BAT_STATUS_USB_MSK)
									{
										batteryString += "&#x1F50C"; // plugged in symbol
									}
								if(batteryStatus & BAT_STATUS_GOOD_MSK)
									{
										batteryString += "&#x1F50B"; //battery symbol
									}
								else
									{
										batteryString += "&#x1FAAB"; // low battery symbol
									}
								if(batteryStatus & BAT_STATUS_BAT_PRESENT_MSK)
									{
									if(batteryStatus & BAT_STATUS_CHARGING_MSK)
										{
											batteryString += "&#x026A1"; //battery charging symbol
										}
									}
								else
									{
										batteryString += "&#x0274C"; //battery not present symbol
									}
//>>> UNCOMMENT TO TEST, LOG AND DEBUG BATTERY CHARGING AND DISCHARGING (adds battery % to string) >>>
//								let batteryPercent=btValue.getUint8(5);
//								batteryPercent=String(batteryPercent).padStart(3,' ');
//								batteryString += " " + batteryPercent + "%"
//<<< UNCOMMENT TO TEST, LOG AND DEBUG BATTERY CHARGING AND DISCHARGING  (adds battery % to string) <<<*/
      					document.getElementById("batteryValue").innerHTML = "Counter    " + batteryString;

	async function onDisconnect(event)
	{
		try
			{
				await btDevice.gatt.connect(); //wait while trying to connect to device again
			}
      	catch(error)
      		 {
      		//disconnected>
      			console.log('Error11: ' + error.code );
      			if(error.code == 19)//this is a network error meaning bluetooth has been turned off
      				{
     					console.log('Error12: Disconnected');
						displaySection1Status("Disconnected. Please ensure Bluetooth is enabled and device is in range and powered up","red");
						enableDisableButton('button1',disable);
						enableDisableCount(disable); //grey out count and buttons
						waitForBluetoothEnable=setInterval( function()
      						{
								if(document.getElementById('button2').innerHTML==button2SecondaryString)
									{
										enableDisableButton('button2',disable);
									}
								let btConnectionStatus = btDevice.gatt.connect();
      							btConnectionStatus.then
							//reconnected>
      							(async result =>
      								{
										clearInterval(waitForBluetoothEnable);
										displaySection1Status("","black");
										enableDisableButton('button1',enable);
      									enableDisableCount(enable);//display count and buttons in normal colours and enable count notifications
                                		btService = await btServer.getPrimaryService(btServiceId);
                                		btCharacteristic=await btService.getCharacteristic(btCharacteristicId);
										if(document.getElementById('button2').innerHTML == button2PrimaryString) //if count hasn't been stopped
											{
												await btCharacteristic.startNotifications();
        		  								btCharacteristic.addEventListener('characteristicvaluechanged',handleCountNotification);
												btValue = await btCharacteristic.readValue();
  		    									displayCount();
											}
										else
											{
												if(document.getElementById('button2').innerHTML == button2SecondaryString) //if count hasn't been stopped
													{
														enableDisableButton('button2',enable);
													}
											}
      									enableDisableCount(enable);//display count and buttons in normal colours and enable count notifications
									}
      							)
      							.catch
      								(error =>
      									{
      										console.log('Error13: ' + error + ', ' + error.code);
      									}
      											);
      									},1000);

      							} //if btDevice.gatt.connect() abpve returns anything other than a network error output the error information to the console as usual
      						else
      							{
      								console.log('Error: '  + error.code + ', message: ' + error.message + ' Service ' + btCharacteristic.service.uuid
      								+ ', uuid ' +btCharacteristic.uuid + ', Notify ' + btCharacteristic.properties.notify + ', Read ' + btCharacteristic.properties.read
      								+ ', Value ' + btCharacteristic.value);
      							}
      					}
 //             }
      		}// end of function onDisconnect
      //<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<< onDisconnect <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<
